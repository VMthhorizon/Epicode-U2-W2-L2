<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BootstrapOnly Mockup</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <div class="p0">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
          <div class="container-fluid mx-5">
            <img
              src="/assets/logo-di-viaggio-dettagliato_23-2148616611.avif"
              style="width: 80px"
            />
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="#"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Saldi</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Last Minute</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Recensioni</a>
                </li>
              </ul>
              <form class="d-flex" role="search">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Cerchi posti da sogno?"
                  aria-label="Search"
                />
                <button class="btn btn-outline-danger" type="submit">
                  Search
                </button>
              </form>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <main>
      <section class="container bg-light my-5 p-5">
        <div class="row">
          <div
            class="col-12 d-flex justify-content-center align-items-center text-secondary border-bottom border-black"
          >
            <h1 class="fw-semibold">Eveline-R</h1>
            <h3 class="fw-lighter fs-5">-Feel the Freedom</h3>
          </div>
          <div
            class="col-12 d-flex justify-content-center align-content-center"
          >
            <h2 class="text-secondary fst-italic fw-light fs-2 text-center">
              Scopri le destinazioni più calde del momento
            </h2>
          </div>
          <div class="col-12 text-center">
            <button type="button" class="btn btn-info text-light">
              Prenota ora
            </button>
          </div>
        </div>
      </section>
      <div class="row-cols-2 d-flex justify-content-between">
        <div class="col"><h1>Saldi</h1></div>
        <div class="col"><h2>Nascondi sezione</h2></div>
      </div>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
